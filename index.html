<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>BorderRadius</title>
</head>
<body>
  <div id="wrapper">
    <div id="border"><h1>BorderRadius</h1></div>
    <div id="border-changer">
        <input type="text" id="top-left" placeholder="Top-left">
        <input type="text" id="top-right" placeholder="Top-right">
        <input type="text" id="bottom-right" placeholder="Bottom-right">
        <input type="text" id="bottom-left" placeholder="Bottom-left">
    </div>
  </div>
  <footer>
    <p>Insira os valores, nas respectivas caixas para alterar o border-radius da caixa grande.</p>
    <br><p>Exemplo para uma forma redonda: 50, 50, 50, 50.</p>
    <p>Exemplo para uma forma de caixa de dialogo: 50, 50, 50, 0.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
